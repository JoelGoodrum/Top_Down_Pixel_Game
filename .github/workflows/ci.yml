name: CI

on:
  pull_request:
    branches: ["main"]

jobs:
  format-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: phaser-game

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: phaser-game/package-lock.json

      - run: npm ci
      - run: npm run format:check
      - run: npm run build